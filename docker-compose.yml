version: '3.8'

services:
  db:
    image: postgres:13
    container_name: export-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=exports_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d exports_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - export-network

  app:
    build: .
    container_name: export-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8080
      - NODE_ENV=production
    mem_limit: 256m
    networks:
      - export-network
    volumes:
      - ./src:/app/src
      - ./seeds:/app/seeds

networks:
  export-network:
    driver: bridge

volumes:
  postgres_data: